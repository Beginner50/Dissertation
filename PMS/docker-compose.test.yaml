services:
  postgres-test:
    image: postgres:latest
    container_name: postgres_pms_test
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password1234
      - POSTGRES_DB=pms-test
    ports:
      - "5431:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d postgres" ]
      interval: 5s
      timeout: 2s
      retries: 20 # Arbitrary numbers for interval, timeout, retries
  
  dotnet-server-test:
    build:
      context: ./server
      target: production
    container_name: dotnet_server_test
    # Contains environment variables for MAIL_ACCOUNT, MAIL_PASSWORD, JWT_SECRET_KEY, GOOGLE_API_KEY
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password1234
      - POSTGRES_DB=pms-test
      - POSTGRES_HOST=postgres-test
      - ASPNETCORE_URLS=http://+:5081 # Tell .NET Host to listen to all network interfaces (0.0.0.0) outside the container
    depends_on:
      postgres-test:
        condition: service_healthy
    ports:
      - "5081:5081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5081/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s 

  react-test:
    build:
      context: ./client
      target: production
    container_name: react_pms_test
    depends_on:
      - dotnet-server-test
    ports:
      - "3000:3000"
   
